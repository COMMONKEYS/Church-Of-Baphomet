<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Church Of Baphomet</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet"/>

<style>
:root{
  --bg1:#040404;
  --bg2:#0a0a0a;
  --glass:rgba(255,255,255,0.03);
  --text:#d9d9d9;
  --a:#151515;
  --b:#242424;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Orbitron',sans-serif;
}

body{
  min-height:100vh;
  background:radial-gradient(circle at top,var(--bg2),var(--bg1));
  color:var(--text);
  overflow-x:hidden;
}

body::before{
  content:'';
  position:fixed;
  inset:0;
  background:linear-gradient(120deg,var(--a),var(--b));
  opacity:0.2;
  z-index:-1;
}

/* LOGO ALWAYS ON TOP OF EVERYTHING */
.logo-float{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  height:900px;
  opacity:0.06;
  pointer-events:none;
  z-index:9999;
  filter:drop-shadow(0 0 40px #000);
}

header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  padding:14px 22px;
  backdrop-filter:blur(14px);
  background:rgba(0,0,0,0.85);
  border-bottom:1px solid rgba(255,255,255,0.05);
  z-index:5000;
}

.toprow{
  display:flex;
  justify-content:center;
}

.nav{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.nav button{
  background:rgba(255,255,255,0.02);
  border:1px solid rgba(255,255,255,0.06);
  color:var(--text);
  padding:8px 14px;
  border-radius:999px;
  cursor:pointer;
}

.nav button:hover,
.nav button.active{
  background:rgba(255,255,255,0.08);
}

.settings{
  position:absolute;
  right:14px;
  top:14px;
}

.settings button{
  background:#111;
  border:1px solid rgba(255,255,255,0.06);
  color:var(--text);
  padding:8px 12px;
  border-radius:10px;
  cursor:pointer;
}

.settings-panel{
  position:absolute;
  right:0;
  top:42px;
  background:rgba(0,0,0,0.95);
  border:1px solid rgba(255,255,255,0.05);
  border-radius:12px;
  padding:10px;
  display:none;
  min-width:200px;
}

.settings-panel button{
  width:100%;
  margin:4px 0;
  padding:8px;
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

.panel{
  display:none;
  padding-top:120px;
  max-width:1200px;
  margin:auto;
  padding-left:20px;
  padding-right:20px;
}

.panel.active{display:block}

.title{
  font-size:1.5rem;
  margin-bottom:18px;
  opacity:.8;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:16px;
}

.card{
  background:var(--glass);
  border:1px solid rgba(255,255,255,0.06);
  padding:16px;
  border-radius:16px;
}

.avatar{
  width:60px;
  height:60px;
  border-radius:50%;
  margin-bottom:10px;
}

input{
  width:100%;
  padding:10px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,0.06);
  background:#0b0b0b;
  color:var(--text);
}

/* CASES */
.cases-top{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:16px;
}

.case-card{
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:16px;
  padding:14px;
}

.case-card:hover{
  background:rgba(255,255,255,0.06);
}

.profile-image img{
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:12px;
  margin-bottom:10px;
  filter:grayscale(80%);
}
</style>
</head>

<body>

<audio id="music" src="music.mp3" loop></audio>

<img src="logo.gif" class="logo-float"/>

<header>
  <div class="toprow">
    <div class="nav">
      <button class="tab active" data-tab="dashboard">Dashboard</button>
      <button class="tab" data-tab="roster">Roster</button>
      <button class="tab" data-tab="team">Team</button>
      <button class="tab" data-tab="archive">Resolved</button>
      <button class="tab" data-tab="invest">Investigation</button>
    </div>
  </div>

  <div class="settings">
    <button onclick="toggleSettings()">⚙</button>
    <div class="settings-panel" id="settings"></div>
  </div>
</header>

<!-- DASHBOARD -->
<div class="panel active" id="dashboard">
  <div class="title">SYSTEM DASHBOARD</div>
  <div class="grid">
    <div class="card">Active Units</div>
    <div class="card">Resolved Cases</div>
    <div class="card">Live Monitoring</div>
  </div>
</div>

<!-- ROSTER -->
<div class="panel" id="roster">
  <div class="title">ROSTER</div>
  <div class="grid">
    <div class="card">
      <div class="avatar" style="background:url('cxd.png');background-size:cover"></div>
      CXD<br>Operations Lead
    </div>

    <div class="card">
      <div class="avatar" style="background:url('sin.png');background-size:cover"></div>
      SIN<br>Operations Lead
    </div>
  </div>
</div>

<!-- TEAM -->
<div class="panel" id="team">
  <div class="title">TEAM</div>
  <input placeholder="Coming Soon"/>
  <div class="card">System under development</div>
</div>

<!-- ARCHIVE -->
<div class="panel" id="archive">
  <div class="title">RESOLVED CASES</div>
  <div class="grid">
    <div class="card">Case 001</div>
    <div class="card">Case 002</div>
    <div class="card">Case 003</div>
  </div>
</div>

<!-- INVESTIGATION (ALL CASES MOVED HERE) -->
<div class="panel" id="invest">
  <div class="title">UNDER INVESTIGATION</div>

  <div class="cases-top">

    <div class="case-card">
      <div class="profile-image"><img src="whatevertf.png"></div>
      <h2>Case 1</h2>
    </div>

    <div class="case-card">
      <div class="profile-image"><img src="whatevertf.png"></div>
      <h2>Case 2</h2>
    </div>

    <div class="case-card">
      <div class="profile-image"><img src="whatevertf.png"></div>
      <h2>Case 3</h2>
    </div>

  </div>
</div>

<script>
const tabs=document.querySelectorAll('.tab');
const panels=document.querySelectorAll('.panel');

tabs.forEach(t=>{
  t.onclick=()=>{
    tabs.forEach(x=>x.classList.remove('active'));
    panels.forEach(p=>p.classList.remove('active'));
    t.classList.add('active');
    document.getElementById(t.dataset.tab).classList.add('active');
  }
});

function toggleSettings(){
  const s=document.getElementById('settings');
  s.style.display=s.style.display==='block'?'none':'block';
}

const themes=[];
for(let i=0;i<20;i++){
themes.push(["#040404","#0a0a0a","#151515","#242424"]);
}

function applyTheme(i){
const t=themes[i-1];
document.documentElement.style.setProperty('--bg1',t[0]);
document.documentElement.style.setProperty('--bg2',t[1]);
document.documentElement.style.setProperty('--a',t[2]);
document.documentElement.style.setProperty('--b',t[3]);
}

const s=document.getElementById("settings");
for(let i=1;i<=20;i++){
const b=document.createElement("button");
b.textContent="Theme "+i;
b.onclick=()=>applyTheme(i);
b.style.background="#111";
s.appendChild(b);
}

document.addEventListener("click",()=>{
if(music.paused)music.play().catch(()=>{});
},{once:true});
</script>

</body>
</html>
