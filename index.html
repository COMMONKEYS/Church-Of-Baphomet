<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Church Of Baphomet</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet"/>

<style>
:root{
  --bg1:#050505;
  --bg2:#0c0c0f;
  --glass:rgba(255,255,255,0.04);
  --text:#e5e5e5;
  --a:#2b2b2b;
  --b:#3a3a3a;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Orbitron',sans-serif;
}

body{
  min-height:100vh;
  background:radial-gradient(circle at top,var(--bg2),var(--bg1));
  color:var(--text);
  overflow-x:hidden;
  transition:.3s;
}

body::before{
  content:'';
  position:fixed;
  inset:0;
  background:linear-gradient(120deg,var(--a),var(--b));
  opacity:0.25;
  z-index:-1;
}

.logo-float{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  height:900px;
  opacity:0.12;
  z-index:1;
  pointer-events:none;
}

header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  padding:14px 22px 8px;
  backdrop-filter:blur(14px);
  background:rgba(0,0,0,0.7);
  border-bottom:1px solid rgba(255,255,255,0.06);
  z-index:5000;
}

.toprow{
  display:flex;
  justify-content:center;
}

.nav{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.nav button{
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.08);
  color:var(--text);
  padding:8px 14px;
  border-radius:999px;
  cursor:pointer;
}

.nav button.active,
.nav button:hover{
  background:rgba(255,255,255,0.1);
}

.settings{
  position:absolute;
  right:14px;
  top:14px;
}

.settings button{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  color:var(--text);
  padding:8px 12px;
  border-radius:10px;
  cursor:pointer;
}

.settings-panel{
  position:absolute;
  right:0;
  top:42px;
  background:rgba(0,0,0,0.9);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:12px;
  padding:10px;
  display:none;
  min-width:220px;
  display:flex;
  flex-wrap:wrap;
  gap:6px;
}

.settings-panel button{
  border:none;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
  color:white;
  font-size:11px;
}

.panel{
  display:none;
  padding-top:120px;
  max-width:1200px;
  margin:auto;
  padding-left:20px;
  padding-right:20px;
}

.panel.active{display:block}

.title{
  font-size:1.5rem;
  margin-bottom:18px;
  opacity:.85;
}

.cases-top{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:16px;
  margin-bottom:30px;
}

.case-card{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:16px;
  padding:14px;
}

.card{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  padding:16px;
  border-radius:16px;
}

.avatar{
  width:60px;
  height:60px;
  border-radius:50%;
  background:linear-gradient(45deg,var(--a),var(--b));
  margin-bottom:10px;
}

input{
  width:100%;
  padding:10px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,0.08);
  background:rgba(0,0,0,0.4);
  color:var(--text);
}
</style>
</head>

<body>

<audio id="music" src="music.mp3" loop></audio>

<img src="logo.gif" class="logo-float"/>

<header>
  <div class="toprow">
    <div class="nav">
      <button class="tab active" data-tab="dashboard">Dashboard</button>
      <button class="tab" data-tab="roster">Roster</button>
      <button class="tab" data-tab="team">Team</button>
      <button class="tab" data-tab="archive">Resolved</button>
      <button class="tab" data-tab="invest">Investigation</button>
    </div>
  </div>

  <div class="settings">
    <button onclick="toggleSettings()">⚙</button>
    <div class="settings-panel" id="settings">
      <button style="background:#1a1a1a" onclick="theme(1)">Void</button>
      <button style="background:#222" onclick="theme(2)">Smoke</button>
      <button style="background:#2b2b2b" onclick="theme(3)">Steel</button>
      <button style="background:#333" onclick="theme(4)">Ash</button>
      <button style="background:#3a3a3a" onclick="theme(5)">Graphite</button>
      <button style="background:#101010" onclick="theme(6)">Pitch</button>
      <button style="background:#141414" onclick="theme(7)">Coal</button>
      <button style="background:#181818" onclick="theme(8)">Iron</button>
      <button style="background:#202020" onclick="theme(9)">Carbon</button>
      <button style="background:#262626" onclick="theme(10)">Stone</button>
      <button style="background:#2c2c2c" onclick="theme(11)">Shadow</button>
      <button style="background:#303030" onclick="theme(12)">Slate</button>
      <button style="background:#3b3b3b" onclick="theme(13)">Dust</button>
      <button style="background:#444" onclick="theme(14)">Fog</button>
      <button style="background:#111" onclick="theme(15)">Night</button>
      <button style="background:#0d0d0d" onclick="theme(16)">Blackout</button>
      <button style="background:#151515" onclick="theme(17)">Deep</button>
      <button style="background:#1c1c1c" onclick="theme(18)">Grain</button>
      <button style="background:#222" onclick="theme(19)">Metal</button>
      <button style="background:#2a2a2a" onclick="theme(20)">Rust</button>
    </div>
  </div>
</header>

<div class="panel active" id="dashboard">
  <div class="title">SYSTEM DASHBOARD</div>
  <div class="card">Active Units</div>
</div>

<div class="panel" id="roster">
  <div class="title">ROSTER</div>
  <div class="card">
    <div class="avatar"></div>
    CXD<br>Baphomet
  </div>
</div>

<div class="panel" id="team">
  <div class="title">TEAM</div>
  <input placeholder="Coming Soon"/>
</div>

<div class="panel" id="archive">
  <div class="title">RESOLVED</div>
  <div class="card">Case Log</div>
</div>

<div class="panel" id="invest">
  <div class="title">UNDER INVESTIGATION</div>
  <div class="cases-top">
    <div class="case-card">Case 1</div>
    <div class="case-card">Case 2</div>
    <div class="case-card">Case 3</div>
  </div>
</div>

<script>
const tabs=document.querySelectorAll(".tab");
const panels=document.querySelectorAll(".panel");
const music=document.getElementById("music");

tabs.forEach(t=>{
  t.onclick=()=>{
    tabs.forEach(x=>x.classList.remove("active"));
    panels.forEach(p=>p.classList.remove("active"));
    t.classList.add("active");
    document.getElementById(t.dataset.tab).classList.add("active");
  }
});

function toggleSettings(){
  const s=document.getElementById("settings");
  s.style.display=s.style.display==="flex"?"none":"flex";
}

function theme(n){
  const themes=[
    ["#050505","#0c0c0f","#e5e5e5"],
    ["#0a0a0a","#111","#d0d0d0"],
    ["#101010","#1a1a1a","#cfcfcf"],
    ["#141414","#1f1f1f","#c0c0c0"],
    ["#181818","#222","#bdbdbd"],
    ["#000","#0d0d0d","#ffffff"]
  ];
  let t=themes[n%themes.length];
  document.documentElement.style.setProperty("--bg1",t[0]);
  document.documentElement.style.setProperty("--bg2",t[1]);
  document.documentElement.style.setProperty("--text",t[2]);
}

document.addEventListener("click",()=>{
  if(music.paused) music.play().catch(()=>{});
},{once:true});
</script>

</body>
</html>
